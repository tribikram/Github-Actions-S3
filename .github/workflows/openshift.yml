name: Deploy to OpenShift
on:
  push:
    branches: [ "main" ] # Triggers on every push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install OC CLI
        uses: redhat-actions/oc-installer@v1
        with:
          oc_version: 'latest'

      - name: Authenticate with OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          namespace: ${{ secrets.OPENSHIFT_NAMESPACE }}

      - name: Trigger OpenShift Build
        # This tells OpenShift to pull the latest code and start the build
        run: |
          oc start-build myapp --from-dir=. --follow -n ${{ secrets.OPENSHIFT_NAMESPACE }}

      - name: Verify Deployment
        run: |
          oc rollout status deployment/myapp -n ${{ secrets.OPENSHIFT_NAMESPACE }}
